name: Performance & Stress Tests

on:
  schedule:
    # Run nightly at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      intensity:
        description: 'Test intensity (quick, normal, intensive)'
        required: true
        default: 'normal'

jobs:
  ratchet-performance:
    name: Ratchet Key Generation Performance
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            pkg-config \
            time \
            --no-install-recommends

      - name: Build tests
        run: |
          make clean-all
          make certs
          make tests

      - name: Run extended ratchet performance test
        run: |
          echo "=== Ratchet Performance Test ==="
          /usr/bin/time -v ./bin/test_ratchet || true

  multipath-stress:
    name: Multi-Path Delivery Stress Test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            pkg-config \
            --no-install-recommends

      - name: Build tests
        run: |
          make clean-all
          make certs
          make tests

      - name: Run multi-path stress test
        run: |
          echo "=== Multi-Path Delivery Stress Test ==="
          ./bin/test_multipath || true

  adaptive-engine-stress:
    name: Adaptive Engine State Machine Test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            pkg-config \
            --no-install-recommends

      - name: Build tests
        run: |
          make clean-all
          make certs
          make tests

      - name: Run adaptive engine stress test
        run: |
          echo "=== Adaptive Engine Stress Test ==="
          ./bin/test_adaptive || true

  integration-test:
    name: Integration Test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            pkg-config \
            netcat-openbsd \
            --no-install-recommends

      - name: Build all
        run: |
          make clean-all
          make certs
          make all

      - name: Integration test - Server startup
        run: |
          echo "=== Starting Server ==="
          timeout 5 ./bin/server &
          SERVER_PID=$!
          sleep 2
          
          echo "Server PID: $SERVER_PID"
          if ps -p $SERVER_PID > /dev/null; then
            echo "✓ Server started successfully"
            kill $SERVER_PID || true
          else
            echo "✗ Server failed to start"
            exit 1
          fi

      - name: Upload performance logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: performance-logs
          path: |
            perf-*.log
            stress-*.log
          retention-days: 14
